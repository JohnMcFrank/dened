apiVersion: apps/v1
kind: Deployment
metadata:
  name: dened
  labels:
    app: dened
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dened
  template:
    metadata:
      labels:
        app: dened
    spec:
      serviceAccountName: dened-sa
      containers:
        - name: dened
          image: dened:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CONFIG_FILE
              value: /config/config.yaml
            - name: LOG_LEVEL
              value: INFO
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: dened-config
              mountPath: /config
              readOnly: true
            - name: dened-proxies
              mountPath: /proxies
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 20

        - name: tor
          image: dperson/torproxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9050
              name: socks
            - containerPort: 9051
              name: control
          volumeMounts:
            - name: tor-config
              mountPath: /etc/tor/torrc
              subPath: torrc
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: dened-config
          configMap:
            name: dened-config
        - name: dened-proxies
          configMap:
            name: dened-proxies
        - name: tor-config
          configMap:
            name: tor-config
