apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-rotator-tool
  labels:
    app: ip-rotator-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ip-rotator-tool
  template:
    metadata:
      labels:
        app: ip-rotator-tool
    spec:
      containers:
      - name: ip-rotator
        image: ip-rotator-tool:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        - containerPort: 9090
        env:
        - name: CONFIG_FILE
          value: "/config/config.yaml"
        - name: PYTHONPATH
          value: "/app/monitoring"
        volumeMounts:
        - name: config-volume
          mountPath: /config
        - name: proxy-list
          mountPath: /proxies
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: ip-rotator-config
      - name: proxy-list
        configMap:
          name: proxy-list
