apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-rotator-loadbalancer
  labels:
    app: ip-rotator-loadbalancer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ip-rotator-loadbalancer
  template:
    metadata:
      labels:
        app: ip-rotator-loadbalancer
    spec:
      containers:
        - name: loadbalancer
          image: your-registry/ip-rotator-tool:latest
          ports:
            - containerPort: 8080
            - containerPort: 9090
          env:
            - name: USE_INTERNAL_PROXY
              value: "true"
            - name: INTERNAL_PROXY_COUNT
              value: "10"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
